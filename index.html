<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Color Switcher</title>
</head>
<body>
  <div class="container">
    <h1 class="heading">Color Changer</h1>
    <div class="inputContainer">
      <button class="randomBtn">Random Color</button>
      <input id="colorInput"  type="text" placeholder="color">
      <button class="applyBtn">Apply Color</button>
      
    </div>
    <p class="currentColor">Current Color: <span class="currentColorValue">Coffee</span></p>

  </div>






  <script src="script.js"></script> 
</body>
</html>
